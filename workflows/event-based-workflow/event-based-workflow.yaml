id: event-based-workflow
name: Event-based workflow
start: webhook
options: {}
steps:
  - id: transform-data
    name: Transform data
    adaptor: "@openfn/language-common@latest"
    expression: ./transform-data.js
  - id: webhook
    type: webhook
    enabled: true
    next:
      transform-data:
        disabled: false
        condition: always
